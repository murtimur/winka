<div>
  <button class="btn btn-secondary" (click)="openModal(myModal)">Renk Ekle</button>
  <ng-template #myModal let-modal>
    <div class="modal-header">
      <h4 class="modal-title">Renk Ekle</h4>
      <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
    </div>
    <div class="modal-body">
      <form (ngSubmit)="ekle()">
        <app-input-component [model]="kodu()" [error]="errors()['kodu']" label="Kodu" />
        <app-input-component label="Adı" />
        <div class="flex-1 flex flex-col items-center">
          <p-colorpicker
            name="color"
            [(ngModel)]="color"
            format="rgb"
            inputId="cp-rgb"
            class="mb-4"
          />
          <span>{{ ' - r:' + color.r + ' g:' + color.g + ' b:' + color.b }}</span>
        </div>
        <button type="submit" hidden>Ekle</button>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-success" (click)="modal.close()">Kapat</button>
    </div>
  </ng-template>
</div>
