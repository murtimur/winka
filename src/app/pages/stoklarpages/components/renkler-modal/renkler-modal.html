<div>
  <button class="btn btn-secondary" (click)="openModal(colorModal)">Renk Ekle</button>
  <ng-template #colorModal let-modal>
    <div class="modal-header">
      <h4 class="modal-title">Renk Ekle</h4>
      <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
    </div>
    <div class="modal-body">
      <form (ngSubmit)="ekle()">
        <app-input-component
          (modelChange)="onFieldChange('kodu', $event)"
          [model]="renk().kodu"
          [error]="errors()['kodu']"
          label="Kodu"
        />
        <app-input-component
          [model]="renk().adi"
          (modelChange)="onFieldChange('adi', $event)"
          label="Adı"
        />
        <div class="flex-1 flex flex-col items-center">
          <p-colorpicker
            name="color"
            [ngModel]="intToHex(renk().renk)"
            (ngModelChange)="onColorChange($event)"
            format="hex"
            inputId="cp-rgb"
            class="mb-4"
          />
        </div>
        <button type="submit" class="btn btn-secondary mt-2">Ekle</button>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-success" (click)="modal.close()">Kapat</button>
    </div>
  </ng-template>
</div>
